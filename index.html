<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: system-ui, Arial;
  background:#0f172a;
}

/* MAP */
#map {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* CARD */
.card {
  background:#111827;
  padding:24px;
  border-radius:16px;
  text-align:center;
  color:white;
  width:260px;
}

/* BUTTON */
button {
  margin-top:16px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="overlay" id="overlay">
  <div class="card">
    <h3>📍 Autoriser la position</h3>
    <p style="font-size:14px;opacity:0.7">
      On affiche votre position sur la carte
    </p>
    <button onclick="start()">Continuer</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== CONFIG =====
const supabaseUrl = "https://bsxvtsuroulsqxmlujdf.supabase.co";
const supabaseKey = "sb_publishable_wO1610WLpZfjcNVRvyoBxA__HWD4Z_L";
const db = supabase.createClient(supabaseUrl, supabaseKey);

// ===== VARIABLES =====
let map = L.map('map').setView([48.8566, 2.3522], 5);
let markers = {};
let myId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id", myId);

// ===== MAP =====
L.tileLayer(
  'https://{s}-tiles.locationiq.com/v3/streets/r/{z}/{x}/{y}.png?key=pk.e13d39038d291e1338bff9965816491f'
).addTo(map);

// ===== START =====
function start(){
  document.getElementById("overlay").style.display = "none";

  navigator.geolocation.watchPosition(updatePosition, err => {
    alert("Active la localisation");
  },{
    enableHighAccuracy:true
  });
}

// ===== UPDATE POSITION =====
async function updatePosition(pos){
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map.setView([lat, lng], 15);

  // envoyer position
  await db.from("users").upsert({
    id: myId,
    lat: lat,
    lng: lng,
    time: new Date().toISOString()
  });

  renderUsers();
}

// ===== RENDER USERS =====
async function renderUsers(){
  const { data } = await db.from("users").select("*");
  if(!data) return;

  data.forEach(u => {
    if(markers[u.id]){
      markers[u.id].setLatLng([u.lat, u.lng]);
    } else {
      markers[u.id] = L.marker([u.lat, u.lng])
        .addTo(map)
        .bindPopup(u.id === myId ? "Vous" : "Utilisateur");
    }
  });
}

// ===== REALTIME =====
db.channel("live")
.on("postgres_changes", {
  event: "*",
  schema: "public",
  table: "users"
}, () => {
  renderUsers();
})
.subscribe();

</script>

</body>
</html>
