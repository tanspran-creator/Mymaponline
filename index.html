<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Map</title>

<!-- MapLibre (meilleur rendu que Leaflet) -->
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  background:#020617;
  font-family:system-ui;
}

#map {
  position:fixed;
  inset:0;
}

/* overlay stylé */
.overlay {
  position:fixed;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.card {
  background:#0f172a;
  padding:28px;
  border-radius:18px;
  color:white;
  text-align:center;
  width:280px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

button {
  margin-top:16px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2>📍 Live Map</h2>
    <p style="opacity:0.7;font-size:14px;">
      Autorise ta position pour apparaître sur la carte
    </p>
    <button onclick="start()">Continuer</button>
  </div>
</div>

<script>
// ===== SUPABASE (TES INFOS) =====
const supabaseUrl = "https://bsxvtsuroulsqxmlujdf.supabase.co";
const supabaseKey = "sb_publishable_wO1610WLpZfjcNVRvyoBxA__HWD4Z_L";
const db = supabase.createClient(supabaseUrl, supabaseKey);

// ===== MAP =====
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [2.35,48.85],
  zoom: 4
});

// ===== USERS =====
let markers = {};
let myId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id", myId);

// ===== START =====
function start(){
  document.getElementById("overlay").style.display = "none";

  navigator.geolocation.watchPosition(updatePosition, () => {
    alert("Active la localisation");
  }, {
    enableHighAccuracy:true
  });
}

// ===== UPDATE POSITION =====
async function updatePosition(pos){
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map.flyTo({ center:[lng,lat], zoom:15 });

  await db.from("users").upsert({
    id: myId,
    lat,
    lng,
    time: new Date().toISOString()
  });

  loadUsers();
}

// ===== LOAD USERS =====
async function loadUsers(){
  const { data } = await db.from("users").select("*");
  if(!data) return;

  data.forEach(u => {
    if(markers[u.id]){
      markers[u.id].setLngLat([u.lng, u.lat]);
    } else {
      const el = document.createElement("div");
      el.style.width = "12px";
      el.style.height = "12px";
      el.style.borderRadius = "50%";
      el.style.background = u.id === myId ? "#22c55e" : "#3b82f6";

      markers[u.id] = new maplibregl.Marker(el)
        .setLngLat([u.lng, u.lat])
        .addTo(map);
    }
  });
}

// ===== REALTIME =====
db.channel("live")
.on("postgres_changes", {
  event: "*",
  schema: "public",
  table: "users"
}, () => {
  loadUsers();
})
.subscribe();

</script>

</body>
</html>
